openapi: 3.0.3
info:
  title: TaskFlow - Task Management Platform API
  description: |
    RESTful API for the TaskFlow task management platform.
    Supports user authentication (JWT), project management with RBAC,
    task CRUD with filtering/sorting/pagination, comments, file attachments,
    and analytics.
  version: 1.0.0
  contact:
    name: TaskFlow API Support

servers:
  - url: https://taskflow-backend-kiya.onrender.com/api
    description: Production Server
  - url: http://localhost:5000/api
    description: Local Development Server

tags:
  - name: Authentication
    description: Operations related to user authentication and profiles
  - name: Projects
    description: Operations related to project management
  - name: Tasks
    description: Operations related to tasks
  - name: Comments
    description: Operations related to task comments
  - name: Files
    description: Operations related to file attachments
  - name: Analytics
    description: Operations related to dashboard analytics

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from login or register endpoints

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time

    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        members:
          type: array
          items:
            $ref: '#/components/schemas/ProjectMember'

    ProjectMember:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        role:
          type: string
          enum: [ADMIN, MEMBER]
        user:
          type: object
          properties:
            name:
              type: string
            email:
              type: string

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [OPEN, IN_PROGRESS, RESOLVED, CLOSED]
        priority:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        dueDate:
          type: string
          format: date-time
          nullable: true
        projectId:
          type: string
          format: uuid
        creatorId:
          type: string
          format: uuid
        assigneeId:
          type: string
          format: uuid
          nullable: true
        version:
          type: integer
          description: Used for Optimistic Concurrency Control
        deletedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        taskId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        user:
          type: object
          properties:
            name:
              type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    File:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fileName:
          type: string
        fileType:
          type: string
        fileSize:
          type: integer
        filePath:
          type: string
        taskId:
          type: string
          format: uuid
        uploaderId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: string

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

paths:
  # =============== AUTHENTICATION ===============
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: John Doe
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  minLength: 6
                  example: mypassword123
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Validation error or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags: [Authentication]
      summary: Login with credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  example: mypassword123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/profile:
    get:
      tags: [Authentication]
      summary: Get current user profile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
    put:
      tags: [Authentication]
      summary: Update current user profile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:
                  type: string
                  example: Jane Doe
                email:
                  type: string
                  format: email
                  example: jane@example.com
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Validation error or email taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # =============== PROJECTS ===============
  /projects:
    get:
      tags: [Projects]
      summary: Get all projects the user is a member of
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
    post:
      tags: [Projects]
      summary: Create a new project
      description: The creator automatically becomes an ADMIN member.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: My Project
                description:
                  type: string
                  example: A collaborative project
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'

  /projects/{id}:
    get:
      tags: [Projects]
      summary: Get project by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Project details including members
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '403':
          description: Not a member
        '404':
          description: Project not found
    put:
      tags: [Projects]
      summary: Update project (Admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Project updated
        '403':
          description: Admin role required
    delete:
      tags: [Projects]
      summary: Delete project (Admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Project deleted
        '403':
          description: Admin role required

  /projects/{projectId}/members:
    post:
      tags: [Projects]
      summary: Add a member to the project (Admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: member@example.com
                role:
                  type: string
                  enum: [ADMIN, MEMBER]
                  default: MEMBER
      responses:
        '201':
          description: Member added
        '400':
          description: User not found or already a member
        '403':
          description: Admin role required

  /projects/{projectId}/members/{userId}:
    delete:
      tags: [Projects]
      summary: Remove a member from the project (Admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Member removed
        '403':
          description: Admin role required

  # =============== TASKS ===============
  /tasks:
    get:
      tags: [Tasks]
      summary: Get all tasks with filtering, searching, sorting, and pagination
      security:
        - BearerAuth: []
      parameters:
        - name: projectId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [OPEN, IN_PROGRESS, RESOLVED, CLOSED]
        - name: priority
          in: query
          schema:
            type: string
            enum: [LOW, MEDIUM, HIGH]
        - name: search
          in: query
          description: Search by title or description (case-insensitive)
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: sort
          in: query
          description: Field to sort by
          schema:
            type: string
            enum: [createdAt, title, status, priority]
            default: createdAt
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Paginated task list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      tags: [Tasks]
      summary: Create a new task
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, description, projectId]
              properties:
                title:
                  type: string
                  example: Implement login page
                description:
                  type: string
                  example: Create a login form with email and password
                status:
                  type: string
                  enum: [OPEN, IN_PROGRESS, RESOLVED, CLOSED]
                  default: OPEN
                priority:
                  type: string
                  enum: [LOW, MEDIUM, HIGH]
                  default: MEDIUM
                dueDate:
                  type: string
                  format: date-time
                projectId:
                  type: string
                  format: uuid
                assigneeId:
                  type: string
                  format: uuid
                tags:
                  type: array
                  items:
                    type: string
                  example: [frontend, auth]
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '403':
          description: Not a project member

  /tasks/bulk:
    post:
      tags: [Tasks]
      summary: Bulk create tasks
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectId, tasks]
              properties:
                projectId:
                  type: string
                  format: uuid
                tasks:
                  type: array
                  items:
                    type: object
                    required: [title, description]
                    properties:
                      title:
                        type: string
                      description:
                        type: string
                      status:
                        type: string
                      priority:
                        type: string
                      dueDate:
                        type: string
                        format: date-time
                      assigneeId:
                        type: string
                        format: uuid
      responses:
        '201':
          description: Tasks created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Successfully created 5 tasks

  /tasks/{id}:
    get:
      tags: [Tasks]
      summary: Get a single task by ID
      description: Returns full task details including comments, files, assignee, creator, and tags.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: Task not found
    put:
      tags: [Tasks]
      summary: Update a task
      description: |
        Uses Optimistic Concurrency Control — the `version` field is required.
        If the version doesn't match the current version in the database, a 409 Conflict is returned.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version]
              properties:
                title:
                  type: string
                description:
                  type: string
                status:
                  type: string
                  enum: [OPEN, IN_PROGRESS, RESOLVED, CLOSED]
                priority:
                  type: string
                  enum: [LOW, MEDIUM, HIGH]
                dueDate:
                  type: string
                  format: date-time
                assigneeId:
                  type: string
                  format: uuid
                  nullable: true
                version:
                  type: integer
                  description: Required for OCC — must match current task version
      responses:
        '200':
          description: Task updated
        '409':
          description: Conflict — task was modified by another user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Tasks]
      summary: Soft delete a task
      description: Sets `deletedAt` timestamp. Only Admins or the task creator can delete.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Task soft deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Task soft deleted successfully
        '403':
          description: Forbidden
        '404':
          description: Task not found

  # =============== COMMENTS ===============
  /comments:
    post:
      tags: [Comments]
      summary: Add a comment to a task
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [taskId, content]
              properties:
                taskId:
                  type: string
                  format: uuid
                content:
                  type: string
                  example: This looks good, ready for review!
      responses:
        '201':
          description: Comment added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'

  /comments/task/{taskId}:
    get:
      tags: [Comments]
      summary: Get all comments for a task
      security:
        - BearerAuth: []
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'

  /comments/{id}:
    put:
      tags: [Comments]
      summary: Update a comment (owner only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        '200':
          description: Comment updated
        '403':
          description: Not the comment owner
    delete:
      tags: [Comments]
      summary: Delete a comment (owner only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Comment deleted
        '403':
          description: Not the comment owner

  # =============== FILES ===============
  /files/upload:
    post:
      tags: [Files]
      summary: Upload files to a task
      description: Upload up to 5 files at once. Max file size is 25MB.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [taskId, files]
              properties:
                taskId:
                  type: string
                  format: uuid
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  maxItems: 5
      responses:
        '201':
          description: Files uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  files:
                    type: array
                    items:
                      $ref: '#/components/schemas/File'

  /files/{id}/download:
    get:
      tags: [Files]
      summary: Download a file
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: File binary data
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: File not found

  /files/{id}:
    delete:
      tags: [Files]
      summary: Delete a file (uploader only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: File deleted
        '403':
          description: Not the uploader

  # =============== ANALYTICS ===============
  /analytics/{projectId}/overview:
    get:
      tags: [Analytics]
      summary: Get project overview statistics
      description: Returns task counts grouped by status and priority.
      security:
        - BearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Overview statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalTasks:
                    type: integer
                  statusCounts:
                    type: object
                    properties:
                      OPEN:
                        type: integer
                      IN_PROGRESS:
                        type: integer
                      RESOLVED:
                        type: integer
                      CLOSED:
                        type: integer
                  priorityCounts:
                    type: object
                    properties:
                      LOW:
                        type: integer
                      MEDIUM:
                        type: integer
                      HIGH:
                        type: integer

  /analytics/{projectId}/performance:
    get:
      tags: [Analytics]
      summary: Get user performance metrics
      description: Returns task assignment and completion metrics for the current user (or specified userId).
      security:
        - BearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: query
          description: Optional user ID to check metrics for (defaults to current user)
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Performance metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  assignedTasks:
                    type: integer
                  completedTasks:
                    type: integer
                  delayedTasks:
                    type: integer
                  completionRate:
                    type: integer
                    description: Percentage (0-100)

  /analytics/{projectId}/export:
    get:
      tags: [Analytics]
      summary: Export task data as CSV
      description: Downloads all tasks in the project as a CSV file.
      security:
        - BearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string
          headers:
            Content-Disposition:
              description: File download disposition
              schema:
                type: string
                example: attachment; filename=project-xxx-tasks.csv
